name: Create and publish Docker images

on:
  push:
    branches:
      - '**'
    paths:
      - 'frontend/**'
      - 'deployments/env/frontend/**'
      - 'deployments/charts/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  fe-build-and-push-image:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - frontend

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Derive service name
        id: svc
        run: |
          SERVICE=$(basename "${{ matrix.service }}")
          echo "name=$SERVICE" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ steps.svc.outputs.name }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          file: ${{ matrix.service }}/Dockerfile
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ steps.svc.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
