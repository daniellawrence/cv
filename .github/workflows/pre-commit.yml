name: Pre-commit checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Install kubectl-validate
        run: |
          curl -sSfL https://github.com/kubernetes-sigs/kubectl-validate/releases/download/v0.0.4/kubectl-validate_linux_amd64.tar.gz \
            | tar -xz -C $(go env GOPATH)/bin kubectl-validate

      - uses: pre-commit/action@v3.0.1
