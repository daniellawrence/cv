# Note: In dev environment, this will be overridden by env/dev.yaml to use registry:5000
image:
  name: cv-frontend

frontendruntimeconfig:
  enabled: true
  services:
    - experience
    - education
    - interest
    - identity
    - qrcode

# Build metadata for nginx headers (can be empty in dev)
buildMetadata:
  contentSha1: "dev-build"
  buildTimestamp: "unknown"
