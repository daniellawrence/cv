repos:
  - repo: local
    hooks:
      - id: kubectl-validate
        name: kubectl-validate
        language: system
        entry: kubectl-validate
        args:
          - --local-crds=infra/crds/traefik
        files: ^infra/deployments/artifacts/(?!.*redis-secret-init/)

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        files: ^frontend/src/
        pass_filenames: false

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        exclude: ^infra/crds/

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.6
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'for d in backend/*/; do [ -f "$d/go.mod" ] && (cd "$d" && golangci-lint run --fix); done'
        files: ^backend/
        pass_filenames: false

  - repo: local
    hooks:
      - id: validate-python-tests
        name: validate-python-tests
        language: system
        entry: bash -c 'python3 -m py_compile "$@" || exit 1' --
        files: ^tests/.*\.py$
        exclude: ^tests/integration/.venv/
        pass_filenames: true
