# Chart test to verify the container image configuration matches expected values
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-image-config-validator
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: validator
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          
          echo "=== Image Configuration Validation Tests ==="
          
          # Test 1: Verify repository is configured
          if [ -z "{{ .Values.image.repo }}" ]; then
            echo "ERROR: Image repository is not configured"
            exit 1
          fi
          echo "✓ Repository configured: {{ .Values.image.repo }}"
          
          # Test 2: Verify tag exists (use default if not set)
          TAG="{{ default \"latest\" .Values.image.tag }}"
          if [ -z "$TAG" ]; then
            echo "ERROR: Image tag is empty and no default provided"
            exit 1
          fi
          echo "✓ Tag configured: $TAG"
          
          # Test 3: Verify pull policy is set
          PULL_POLICY="{{ .Values.image.pullPolicy }}"
          if [ -z "$PULL_POLICY" ]; then
            echo "WARNING: Pull policy not explicitly set, using default"
          else
            echo "✓ Pull policy configured: $PULL_POLICY"
          fi
          
          # Test 4: Verify expected image format
          EXPECTED_IMAGE="{{ .Values.image.repo }}/{{ default .Release.Name .Values.image.name }}:$TAG"
          echo "✓ Expected full image name: $EXPECTED_IMAGE"
          
          # Test 5: If image name is custom, verify it's used
          if [ -n "{{ .Values.image.name }}" ] && [ "{{ .Values.image.name }}" != "" ]; then
            EXPECTED_NAME="{{ .Values.image.repo }}/{{ .Values.image.name }}:$TAG"
            echo "✓ Custom image name detected: $EXPECTED_NAME"
          else
            echo "✓ Using release name as image name: {{ .Release.Name }}:$TAG"
          fi
          
          echo "=== All Image Configuration Tests Passed ==="
  restartPolicy: Never

---
# Additional test to verify the deployment template renders correctly with image values
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-image-values-test
  annotations:
    "helm.sh/hook": test-success
data:
  # Store expected values for cross-validation
  EXPECTED_REPO: "{{ .Values.image.repo }}"
  EXPECTED_TAG: "{{ default \"latest\" .Values.image.tag }}"
  EXPECTED_PULL_POLICY: "{{ .Values.image.pullPolicy }}"
