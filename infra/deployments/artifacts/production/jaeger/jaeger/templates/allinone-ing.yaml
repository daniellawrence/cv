---
# Source: jaeger/templates/allinone-ing.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-query
  labels:
    helm.sh/chart: jaeger-0.71.0
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/instance: jaeger
    app.kubernetes.io/version: "1.45.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: all-in-one
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: jaeger-query-cors@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: tracing.dansysadm.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger-query
                port:
                  number: 16686
