---
# Source: basic-app/templates/deployment-misql.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: education-db
  labels:
    app: education-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: education-db
  template:
    metadata:
      labels:
        app: education-db
    spec:
      containers:
        - name: misql
          image: "dlawrence00/misql:0.0.2"
          imagePullPolicy: Always
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_TCP_PORT
              value: "3306"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger-collector.jaeger:4317
            - name: OTEL_SERVICE_NAME
              value: education-db
          resources:
            null
          volumeMounts:
            - name: misql-data
              mountPath: /data/cv/education.yaml
              subPath: education.yaml
      volumes:
        - name: misql-data
          configMap:
            name: misql-data
