# Source: basic-app/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: education
spec:
  ingressClassName: traefik
  rules:
    - host: education.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: education
                port:
                  number: 8080
