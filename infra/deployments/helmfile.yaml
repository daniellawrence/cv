repositories:
  - name: jaegertracing
    url: https://jaegertracing.github.io/helm-charts
  - name: argo
    url: https://argoproj.github.io/argo-helm

environments:
  dev:
    values:
      - env/dev.yaml

  production:
    values:
      - env/production.yaml

releases:

  - name: interest
    namespace: interest
    labels:
      tier: app
    chart: ./charts/cv-app
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../../backend/interest/helm.values.yaml

  - name: education
    namespace: education
    labels:
      tier: app
    chart: ./charts/cv-app
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../../backend/education/helm.values.yaml

  - name: qrcode
    namespace: qrcode
    labels:
      tier: app
    chart: ./charts/cv-app
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../../backend/qrcode/helm.values.yaml

  - name: identity
    namespace: identity
    labels:
      tier: app
    chart: ./charts/cv-app
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../../backend/identity/helm.values.yaml

  - name: experience
    namespace: experience
    labels:
      tier: app
    chart: ./charts/cv-app
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../../backend/experience/helm.values.yaml

  - name: frontend
    namespace: frontend
    labels:
      tier: app
    chart: ./charts/cv-app
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../../frontend/helm.values.yaml

  - name: argocd
    namespace: argocd
    createNamespace: true
    labels:
      tier: deploy
    chart: argo/argo-cd
    version: 7.8.26
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../argocd/values.yaml.gotmpl
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: ../../bin/kubectl
        args:
          - apply
          - -f
          - ../argocd/projects/
      - events: ["postsync"]
        showlogs: true
        command: ../../bin/kubectl
        args:
          - apply
          - -f
          - ../argocd/dev/
      - events: ["postsync"]
        showlogs: true
        command: ../../scripts/apply-prod-apps.sh

  - name: jaeger
    namespace: jaeger
    createNamespace: true
    labels:
      tier: infra
    chart: jaegertracing/jaeger
    version: 0.71.0
    values:
      - {{ toYaml .Environment.Values | nindent 8 }}
      - ../jaeger/values.yaml.gotmpl
