apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cv-qrcode-prod
  namespace: argocd
spec:
  project: cv-prod
  source:
    repoURL: https://github.com/daniellawrence/cv
    targetRevision: HEAD
    path: infra/deployments/charts/cv-app
    helm:
      valueFiles:
        - ../../env/production.yaml
        - ../../../../backend/qrcode/helm.values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: qrcode
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
