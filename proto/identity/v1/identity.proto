syntax = "proto3";

package identity.v1;

option go_package = "github.com/daniellawrence/cv/gen/go/identity/v1;identityv1";

message Identity {
  string id = 1;
  string name = 2;
  string email = 3;
  string linkedin = 4;  
}

message GetIdentityRequest {
  string id = 1;
}

message ListIdentityRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListIdentityResponse {
  repeated Identity identity = 1;
  string next_page_token = 2;
}

service IdentityService {
  rpc GetIdentity(GetIdentityRequest) returns (Identity);

  rpc ListIdentity(ListIdentityRequest)
      returns (ListIdentityResponse);
}